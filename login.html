<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>登录 · 御弟哥哥</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .auth-shell { display: flex; width: min(800px,100%); background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); overflow: hidden; }
    .auth-aside { width: 320px; flex-shrink: 0; background: linear-gradient(135deg, rgba(255,45,120,0.08), rgba(0,240,255,0.04)); padding: 40px 32px; display: flex; flex-direction: column; justify-content: center; gap: 16px; border-right: 1px solid var(--border); }
    .auth-aside .eyebrow { color: var(--neon-pink); font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; }
    .auth-aside h1 { font-size: 24px; font-weight: 800; line-height: 1.3; background: linear-gradient(135deg, var(--text-primary), var(--neon-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; max-width: 100%; }
    .auth-aside p { color: var(--text-secondary); font-size: 14px; line-height: 1.7; }
    .auth-card { flex: 1; padding: 40px 36px; display: flex; flex-direction: column; justify-content: center; }
    .auth-card h2 { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
    .auth-card > p { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
    .auth-card .form-group { margin-bottom: 18px; }
    .auth-card label { display: block; font-size: 13px; font-weight: 700; color: var(--text-secondary); margin-bottom: 6px; }
    .auth-card input { width: 100%; padding: 12px 14px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-md); color: var(--text-primary); font-size: 15px; outline: none; transition: var(--base); }
    .auth-card input:focus { border-color: var(--neon-pink); box-shadow: 0 0 0 3px rgba(255,45,120,0.15); }
    .auth-card input::placeholder { color: var(--text-dim); }
    .auth-card .btn { width: 100%; padding: 13px; border-radius: var(--radius-md); font-weight: 700; font-size: 15px; background: linear-gradient(135deg, var(--neon-pink), #d92d6a); color: #fff; border: none; cursor: pointer; transition: var(--base); box-shadow: 0 4px 16px rgba(255,45,120,0.25); }
    .auth-card .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,45,120,0.35); }
    .auth-card .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .auth-card .error { display: none; color: var(--neon-red); background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px; }
    .auth-card .links { text-align: center; margin-top: 20px; }
    .auth-card .links a { color: var(--neon-cyan); font-size: 14px; font-weight: 600; transition: var(--fast); }
    .auth-card .links a:hover { color: var(--neon-pink); }
    .auth-card .back-link { text-align: center; margin-top: 12px; }
    .auth-card .back-link a { color: var(--text-muted); font-size: 13px; transition: var(--fast); }
    .auth-card .back-link a:hover { color: var(--text-primary); }
    @media (max-width: 640px) {
      .auth-aside { display: none; }
      .auth-card { padding: 32px 24px; }
    }
  </style>
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-aside">
      <div>
        <p class="eyebrow">Xiaohongshu Studio</p>
        <h1>把灵感整理成能发布的内容。</h1>
      </div>
      <p>登录后可继续使用图片生成、文案生成和爆款改写能力。</p>
    </section>

    <section class="auth-card">
      <h2>欢迎回来</h2>
      <p>登录你的创作台，继续生成图片和文案。</p>

      <div class="error" id="error"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">用户名</label>
          <input type="text" id="username" placeholder="请输入用户名" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn" id="submitBtn">登录</button>
      </form>

      <div class="links">
        <a href="register.html">还没有账号？立即注册</a>
      </div>
      <div class="back-link">
        <a href="index.html">返回首页</a>
      </div>
    </section>
  </main>

  <script>
    // 检测是否通过 file:// 协议打开
    if (window.location.protocol === 'file:') {
      document.getElementById('error').textContent = '请通过 http://localhost:3000/login.html 访问，不要直接打开文件。';
      document.getElementById('error').style.display = 'block';
      document.getElementById('submitBtn').disabled = true;
    }

    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('error');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = '登录中...';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '登录失败');

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        if (data.user.role === 'admin') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'index.html';
        }
      } catch (err) {
        if (err.message === 'Failed to fetch' || err.name === 'TypeError') {
          errorEl.textContent = '无法连接到服务器，请确认服务已启动';
        } else {
          errorEl.textContent = err.message;
        }
        errorEl.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = '登录';
      }
    });
  </script>
</body>
</html>
